packages:
  # Groups of package that can be installed
  groups:
    example: []

  # Packages to install by hostname
  hosts:
    JMBP:
      groups: []
      packages:
        - opencode
        - coreutils
        - lazygit
        - neovim
        - oh-my-posh
        - vivify
        - firefox
        - calibre
        - skills

    JT1:
      groups: []
      packages:
        - opencode
        - skills
        - bitwarden

  # Extra sources for package managers (e.g. brew taps)
  sources:
    brew: # taps
      - "jannis-baum/tap"
    dnf: [] # copr

  # Packages that can be installed
  registry:
    opencode:
      macos: "brew:opencode"
      fedora: "npm:opencode-ai"
    coreutils:
      macos: "brew:coreutils"
      fedora: "ignore"
    neovim:
      macos: "brew:neovim"
    vivify:
      macos: "brew:vivify"
    firefox:
      macos: "brew:cask:firefox"
    calibre:
      macos: "brew:cask:calibre"
    skills:
      macos: "brew:skills"
      fedora: "npm:skills"
    bitwarden:
      macos: "brew:cask:bitwarden"
      fedora: "flatpak:com.bitwarden.desktop"
    spotify:
      macos: "brew:cask:spotify"
    vesktop:
      macos: "brew:cask:vesktop"
    ghostty:
      macos: "brew:cask:ghostty"
    bruno:
      macos: "brew:cask:bruno"
    libreoffice:
      macos: "brew:cask:libreoffice"
